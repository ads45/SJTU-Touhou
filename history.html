    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bg.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: #333;
            line-height: 1.6;
        }
        nav {
            background-color: rgba(44, 62, 80, 0.9);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            backdrop-filter: blur(5px);
        }
        nav a { color: white; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #e67e22; }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background: rgba(255,255,255,0.92);
            border-radius: 10px;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #e67e22;
            text-decoration: none;
        }
        h1 {
            color: #2c3e50;
            border-left: 4px solid #e67e22;
            padding-left: 1rem;
            margin-bottom: 1.5rem;
        }
        .year-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .year-link {
            display: block;
            background: #f5f5f5;
            text-align: center;
            padding: 0.8rem;
            border-radius: 8px;
            text-decoration: none;
            color: #2c3e50;
            font-weight: bold;
            transition: all 0.2s;
        }
        .year-link:hover {
            background: #e67e22;
            color: white;
            transform: translateY(-3px);
        }
        .intro {
            background: #fef9e6;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            border-left: 3px solid #e67e22;
        }
        footer {
            background: rgba(44, 62, 80, 0.9);
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: 1rem;
        }
        @media (max-width: 768px) {
            .container { padding: 1rem; margin: 1rem; }
            .year-list { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }
    </style>
</head>

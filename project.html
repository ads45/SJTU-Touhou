    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bg.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: #333;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        nav {
            background-color: rgba(44, 62, 80, 0.9);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            backdrop-filter: blur(5px);
        }
        nav a { color: white; text-decoration: none; margin-right: 1.5rem; }
        nav a:hover { color: #e67e22; }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #e67e22;
            text-decoration: none;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 2rem;
            text-shadow: 1px 1px 2px black;
        }
        .three-cols {
            display: flex;
            gap: 2rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 10px;
            padding: 2rem;
            flex: 1;
            text-align: center;
            transition: transform 0.2s;
        }
        .card:hover { transform: translateY(-5px); }
        .card h2 {
            color: #2c3e50;
            border-left: none;
            margin-bottom: 1rem;
        }
        .card p { color: #555; margin-bottom: 1.5rem; }
        .btn {
            display: inline-block;
            background: #e67e22;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn:hover { background: #d35400; }
        footer {
            background: rgba(44, 62, 80, 0.9);
            color: white;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .three-cols { flex-direction: column; gap: 1rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>

        </div>
        <div class="card">
            <h2>🎪 活动产出</h2>
            <p>例会周边、海报、PPT、活动录像……</p>
            <a href="activity_project.html" class="btn">进入 →</a>
        </div>
        <div class="card">
